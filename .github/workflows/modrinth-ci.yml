name: Modrinth CI

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC nightly
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of top Velocity plugins to test"
        default: "20"
      timeout:
        description: "Harness timeout in seconds"
        default: "45"

permissions:
  issues: write
  contents: read

jobs:
  modrinth-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache downloaded plugin JARs
        uses: actions/cache@v4
        with:
          path: build/ci-plugins
          key: modrinth-ci-plugins-${{ github.run_id }}
          restore-keys: modrinth-ci-plugins-

      - name: Run Modrinth CI harness
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./gradlew ci \
            -Pci.limit="${{ github.event.inputs.limit || '20' }}" \
            -Pci.timeout="${{ github.event.inputs.timeout || '45' }}" \
            --no-daemon
